version: "3.9"

services:
  # ── Backend API ────────────────────────────────────────────
  # Connects to the Render-hosted PostgreSQL instance via DATABASE_URL,
  # which must be set in server/.env (see server/.env.example).
  api:
    build:
      context: ./server
      target: development
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: development
      PORT: 5000
    volumes:
      - ./server:/app
      - /app/node_modules

  # ── Frontend ───────────────────────────────────────────────
  client:
    build:
      context: ./client
      target: development
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./client/.env
    environment:
      VITE_API_URL: http://localhost:5000
      CI: "false"
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - api
